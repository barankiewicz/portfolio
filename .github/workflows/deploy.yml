name: deployuj

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy-ftp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skopiuj pliki publiczne do _site/
        run: |
          mkdir -p _site
          cp index.html panel.html Alicja-Barankiewicz_CV_data_engineer.pdf _site/
          cp *.mp4 _site/ 2>/dev/null || true
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Wyślij przez FTP (lh.pl) using lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "set ftp:ssl-allow no; mirror -R ./_site/ public_html/portfolio/; quit"
